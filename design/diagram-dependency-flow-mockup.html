<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Momentum · Dependency Flow — Wireframe</title>
<style>
  :root {
    --bg:       #060b18;
    --surface:  #0d1424;
    --card:     #161f33;
    --raised:   #1c2740;
    --border:   #243049;
    --text1:    #f1f5f9;
    --text2:    #cbd5e1;
    --text3:    #94a3b8;
    --text4:    #64748b;
    --text5:    #475569;
    --brand:    #6366f1;
    --brand-l:  #818cf8;
    --todo:     #64748b;
    --prog:     #3b82f6;
    --blocked:  #ef4444;
    --done:     #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text1);
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 14px;
    overflow: hidden;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* ── Context header (mimics the app) ───────────────────────────── */
  .ctx-head {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: rgba(13,20,36,0.9); backdrop-filter: blur(8px);
  }
  .ctx-dot { width: 12px; height: 12px; border-radius: 50%; background: #f97316; }
  .ctx-title { font-weight: 600; font-size: 15px; }
  .ctx-tabs { margin-left: auto; display: flex; gap: 4px; background: var(--raised); border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
  .ctx-tab { padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--text4); cursor: pointer; }
  .ctx-tab.active { background: var(--card); color: var(--text1); box-shadow: 0 1px 2px rgba(0,0,0,0.3); }

  /* ── Toolbar ───────────────────────────────────────────────────── */
  .toolbar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .legend { display: flex; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px; border-radius: 7px; font-size: 11px; font-weight: 600; text-transform: capitalize;
  }
  .chip .sw { width: 8px; height: 8px; border-radius: 3px; }
  .tools { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 11px; border-radius: 8px; font-size: 12px; font-weight: 500;
    background: var(--card); border: 1px solid var(--border); color: var(--text3);
    cursor: pointer; transition: all .15s; user-select: none;
  }
  .btn:hover { color: var(--text1); border-color: var(--text5); }
  .btn.on { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.5); color: var(--brand-l); }
  .btn .ic { font-size: 13px; }
  .zoomgrp { display: flex; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .zoomgrp button { background: none; border: none; color: var(--text3); width: 30px; height: 30px; font-size: 16px; cursor: pointer; }
  .zoomgrp button:hover { color: var(--text1); background: var(--raised); }
  .zoomgrp .lvl { font-size: 11px; color: var(--text4); width: 42px; text-align: center; }

  /* ── Stage ─────────────────────────────────────────────────────── */
  .stage { flex: 1; position: relative; overflow: hidden; display: flex; }
  .canvas-wrap { flex: 1; position: relative; cursor: grab; }
  .canvas-wrap.panning { cursor: grabbing; }
  .canvas-wrap.connect { cursor: crosshair; }
  svg { display: block; width: 100%; height: 100%; }

  /* node hover handle reveal */
  .node-grp { cursor: pointer; }
  .handle { opacity: 0; transition: opacity .15s; }
  .connect .handle { opacity: 1; }
  .node-grp:hover .handle { opacity: 1; }

  /* ── Detail panel ──────────────────────────────────────────────── */
  .panel {
    width: 300px; border-left: 1px solid var(--border); background: var(--surface);
    display: flex; flex-direction: column; transform: translateX(100%);
    transition: transform .25s ease; position: absolute; right: 0; top: 0; bottom: 0; z-index: 20;
  }
  .panel.open { transform: translateX(0); }
  .panel-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); }
  .panel-x { background: none; border: none; color: var(--text4); cursor: pointer; font-size: 18px; line-height: 1; }
  .panel-x:hover { color: var(--text1); }
  .panel-body { padding: 16px; overflow-y: auto; flex: 1; }
  .pl { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text5); font-weight: 700; margin: 16px 0 7px; }
  .pl:first-child { margin-top: 0; }
  .meta-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 7px; font-size: 11px; font-weight: 600; }
  .dep-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; background: var(--card); margin-bottom: 5px; font-size: 12px; color: var(--text2); }
  .dep-item .d { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .sub-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; }
  .sub-box { width: 15px; height: 15px; border-radius: 4px; border: 1.5px solid var(--border); flex: none; display: flex; align-items: center; justify-content: center; }
  .sub-box.on { background: var(--brand); border-color: var(--brand); color: #fff; font-size: 9px; }
  .add-dep { width: 100%; margin-top: 8px; padding: 8px; border-radius: 8px; background: rgba(99,102,241,0.15); border: 1px dashed rgba(99,102,241,0.5); color: var(--brand-l); font-size: 12px; font-weight: 600; cursor: pointer; }

  /* ── Minimap + hint ────────────────────────────────────────────── */
  .minimap { position: absolute; bottom: 16px; left: 16px; width: 170px; height: 110px; background: rgba(13,20,36,0.85); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; backdrop-filter: blur(6px); }
  .hint { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--text4); background: rgba(13,20,36,0.85); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; backdrop-filter: blur(6px); white-space: nowrap; }

  .wf-banner { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 30; font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--brand-l); background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.35); padding: 5px 14px; border-radius: 20px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="app">

  <!-- Context header -->
  <div class="ctx-head">
    <span class="ctx-dot"></span>
    <span class="ctx-title">Claude Crash Course</span>
    <div class="ctx-tabs">
      <div class="ctx-tab">▦ Board</div>
      <div class="ctx-tab active">⟿ Diagram</div>
      <div class="ctx-tab">🏔 Mountain</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="legend">
      <span class="chip" style="background:rgba(100,116,139,.18);color:#94a3b8"><span class="sw" style="background:#64748b"></span>to do</span>
      <span class="chip" style="background:rgba(59,130,246,.18);color:#60a5fa"><span class="sw" style="background:#3b82f6"></span>in progress</span>
      <span class="chip" style="background:rgba(239,68,68,.18);color:#f87171"><span class="sw" style="background:#ef4444"></span>blocked</span>
      <span class="chip" style="background:rgba(34,197,94,.18);color:#4ade80"><span class="sw" style="background:#22c55e"></span>done</span>
    </div>
    <div class="tools">
      <div class="btn" id="btnConnect"><span class="ic">🔗</span> Connect</div>
      <div class="btn on" id="btnCrit"><span class="ic">⚡</span> Critical path</div>
      <div class="btn" id="btnLayout"><span class="ic">⤢</span> Auto-layout</div>
      <div class="zoomgrp">
        <button id="zOut">−</button>
        <span class="lvl" id="zLvl">100%</span>
        <button id="zIn">+</button>
      </div>
      <div class="btn" id="btnFit">Fit</div>
    </div>
  </div>

  <!-- Stage -->
  <div class="stage">
    <div class="canvas-wrap" id="cv">
      <div class="wf-banner">Wireframe · not yet wired to the app</div>
      <svg id="svg">
        <defs>
          <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L7,3 L0,6 Z" fill="#3a4a6e"></path>
          </marker>
          <marker id="arrowCrit" markerWidth="10" markerHeight="10" refX="7.5" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#818cf8"></path>
          </marker>
          <marker id="arrowBlock" markerWidth="10" markerHeight="10" refX="7.5" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#ef4444"></path>
          </marker>
          <filter id="critGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
            <path d="M36 0 L0 0 0 36" fill="none" stroke="#243049" stroke-width="0.5" opacity="0.5"/>
          </pattern>
        </defs>
        <g id="viewport">
          <rect x="-2000" y="-2000" width="6000" height="5000" fill="url(#grid)"/>
          <g id="edges"></g>
          <g id="nodes"></g>
        </g>
      </svg>

      <div class="minimap"><svg id="mini" width="100%" height="100%"></svg></div>
      <div class="hint" id="hint">Scroll to zoom · drag canvas to pan · click a task for details</div>
    </div>

    <!-- Detail panel -->
    <div class="panel" id="panel">
      <div class="panel-head">
        <div>
          <div style="font-size:15px;font-weight:600;" id="pTitle">—</div>
          <div style="font-size:12px;color:var(--text4);margin-top:3px;" id="pProj">Claude Crash Course</div>
        </div>
        <button class="panel-x" id="pClose">✕</button>
      </div>
      <div class="panel-body" id="pBody"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────
// SAMPLE DATA — represents one project's task graph with dependencies
// ─────────────────────────────────────────────────────────────────────
const NODE_W = 216, NODE_H = 88, ROW_H = 116, SUB_ROW = 22;
const COL_X  = [60, 366, 672, 978, 1284];     // x per dependency rank

const STATUS = { todo:'#64748b', in_progress:'#3b82f6', blocked:'#ef4444', done:'#22c55e' };
const STATUS_TXT = { todo:'To Do', in_progress:'In Progress', blocked:'Blocked', done:'Done' };

const nodes = [
  { id:1, title:'Co-Work: Foundation', icon:'🌐', status:'done',        prio:'high',   logged:7200, est:7200, rank:0, y:250,
    subs:[{t:'Watch intro',done:true},{t:'Set up environment',done:true}] },
  { id:2, title:'Claude Artifacts',     icon:'📖', status:'in_progress', prio:'high',   logged:3600, est:9000, rank:1, y:120,
    subs:[{t:'Read artifact docs',done:true},{t:'Build sample artifact',done:true},{t:'Publish demo',done:false}], expanded:true },
  { id:3, title:'Claude Skills Live',   icon:'🍰', status:'todo',        prio:'medium', logged:0,    est:5400, rank:1, y:392,
    subs:[{t:'Outline skill',done:false}] },
  { id:4, title:'Claude Agents',        icon:'🤖', status:'todo',        prio:'urgent', logged:0,    est:10800,rank:2, y:96,
    subs:[] },
  { id:5, title:'Claude Hooks',         icon:'🪝', status:'todo',        prio:'medium', logged:0,    est:3600, rank:2, y:330,
    subs:[{t:'Stop hook',done:false},{t:'Notification hook',done:false}] },
  { id:6, title:'Loops & Schedule',     icon:'🔁', status:'blocked',     prio:'high',   logged:1200, est:7200, rank:3, y:96,
    subs:[] },
  { id:7, title:'Claude Plugins',       icon:'🧩', status:'todo',        prio:'medium', logged:0,    est:5400, rank:3, y:330,
    subs:[] },
  { id:8, title:'Final Project',        icon:'🚀', status:'todo',        prio:'urgent', logged:0,    est:14400,rank:4, y:230,
    subs:[{t:'Scope project',done:false},{t:'Ship v1',done:false}] },
];
const edges = [
  { from:1, to:2 }, { from:1, to:3 },
  { from:2, to:4 }, { from:2, to:5 }, { from:3, to:5 },
  { from:4, to:6 }, { from:4, to:7 }, { from:5, to:7 },
  { from:6, to:8, blocked:true }, { from:7, to:8 },
];
// critical path (longest estimate chain, runs through the blocked bottleneck)
const CRIT = new Set([1,2,4,6,8]);
const critEdge = (a,b) => CRIT.has(a) && CRIT.has(b);

const byId = id => nodes.find(n => n.id === id);
const nodeX = n => COL_X[n.rank];
const nodeHeight = n => NODE_H + (n.expanded ? (n.subs.length * SUB_ROW + 10) : 0);

function fmt(s){ if(!s) return '0m'; return s<3600 ? Math.round(s/60)+'m' : (s/3600).toFixed(1)+'h'; }

// ─────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
const el=(t,a={})=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const nodesG=document.getElementById('nodes');
const edgesG=document.getElementById('edges');
let critOn=true, connectOn=false, selected=null;

function lightStatus(s){ return s==='done'; }

function drawEdges(){
  edgesG.innerHTML='';
  edges.forEach(e=>{
    const a=byId(e.from), b=byId(e.to);
    const x1=nodeX(a)+NODE_W, y1=a.y+NODE_H/2;
    const x2=nodeX(b),        y2=b.y+NODE_H/2;
    const mx=(x1+x2)/2;
    const d=`M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    const isCrit=critOn && critEdge(e.from,e.to);
    const p=el('path',{ d, fill:'none',
      stroke: e.blocked ? '#ef4444' : isCrit ? '#818cf8' : '#3a4a6e',
      'stroke-width': isCrit ? 3 : 1.8,
      'stroke-dasharray': e.blocked ? '6 4' : '0',
      opacity: isCrit ? 0.95 : 0.55,
      'marker-end': e.blocked ? 'url(#arrowBlock)' : isCrit ? 'url(#arrowCrit)' : 'url(#arrow)',
    });
    edgesG.appendChild(p);
  });
}

function drawNodes(){
  nodesG.innerHTML='';
  nodes.forEach(n=>{
    const x=nodeX(n), h=nodeHeight(n), col=STATUS[n.status];
    const g=el('g',{class:'node-grp'});
    g.addEventListener('click',ev=>{ev.stopPropagation();select(n);});

    const isCrit=critOn && CRIT.has(n.id);
    // crit glow ring
    if(isCrit){
      g.appendChild(el('rect',{x:x-3,y:n.y-3,width:NODE_W+6,height:h+6,rx:14,fill:'none',stroke:'#818cf8',
        'stroke-width':2,opacity:0.55,filter:'url(#critGlow)'}));
    }
    // card body
    g.appendChild(el('rect',{x,y:n.y,width:NODE_W,height:h,rx:12,
      fill:'#161f33', stroke: selected===n.id ? '#fff' : '#243049','stroke-width':selected===n.id?2:1}));
    // status accent bar (left)
    g.appendChild(el('rect',{x,y:n.y,width:5,height:h,rx:2.5,fill:col}));

    // icon
    const ic=el('text',{x:x+18,y:n.y+27,'font-size':15}); ic.textContent=n.icon; g.appendChild(ic);
    // title
    const ti=el('text',{x:x+38,y:n.y+27,'font-size':13,'font-weight':600,fill:'#f1f5f9'});
    ti.textContent = n.title.length>20 ? n.title.slice(0,19)+'…' : n.title; g.appendChild(ti);
    // status pill
    const pw=STATUS_TXT[n.status].length*6.4+16;
    g.appendChild(el('rect',{x:x+NODE_W-pw-12,y:n.y+13,width:pw,height:17,rx:8,fill:col,opacity:0.22}));
    const st=el('text',{x:x+NODE_W-pw/2-12,y:n.y+25,'font-size':10,'font-weight':600,'text-anchor':'middle',fill:col});
    st.textContent=STATUS_TXT[n.status]; g.appendChild(st);

    // progress bar
    const pct = n.est>0 ? Math.min(n.logged/n.est,1) : 0;
    g.appendChild(el('rect',{x:x+18,y:n.y+44,width:NODE_W-34,height:5,rx:2.5,fill:'#1c2740'}));
    if(pct>0) g.appendChild(el('rect',{x:x+18,y:n.y+44,width:(NODE_W-34)*pct,height:5,rx:2.5,
      fill: pct>=1 ? '#22c55e' : col}));

    // bottom meta row
    const meta=el('text',{x:x+18,y:n.y+70,'font-size':10.5,fill:'#94a3b8'});
    let m = `⏱ ${fmt(n.logged)} / ${fmt(n.est)}`;
    if(n.subs.length) m += `   ✓ ${n.subs.filter(s=>s.done).length}/${n.subs.length}`;
    meta.textContent=m; g.appendChild(meta);

    // subtask expand chevron (if has subs)
    if(n.subs.length){
      const chev=el('text',{x:x+NODE_W-16,y:n.y+71,'font-size':11,fill:'#64748b','text-anchor':'middle',style:'cursor:pointer'});
      chev.textContent = n.expanded ? '▾' : '▸';
      chev.addEventListener('click',ev=>{ev.stopPropagation(); n.expanded=!n.expanded; render();});
      g.appendChild(chev);
    }

    // expanded subtasks (bird's-eye structure)
    if(n.expanded){
      let sy=n.y+NODE_H+4;
      g.appendChild(el('line',{x1:x+14,y1:n.y+NODE_H-2,x2:x+NODE_W-12,y2:n.y+NODE_H-2,stroke:'#243049','stroke-width':1}));
      n.subs.forEach(s=>{
        g.appendChild(el('rect',{x:x+18,y:sy,width:13,height:13,rx:3.5,
          fill: s.done?'#6366f1':'transparent', stroke:s.done?'#6366f1':'#3a4a6e','stroke-width':1.4}));
        if(s.done){const ck=el('path',{d:`M${x+21} ${sy+6.5} l2.5 2.5 4.5-5`,stroke:'#fff','stroke-width':1.4,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'});g.appendChild(ck);}
        const stx=el('text',{x:x+38,y:sy+11,'font-size':11,fill:s.done?'#475569':'#cbd5e1',
          'text-decoration':s.done?'line-through':'none'});
        stx.textContent = s.t.length>22 ? s.t.slice(0,21)+'…' : s.t; g.appendChild(stx);
        sy+=SUB_ROW;
      });
    }

    // connection handles (left input, right output)
    g.appendChild(el('circle',{class:'handle',cx:x,cy:n.y+NODE_H/2,r:5,fill:'#0d1424',stroke:'#818cf8','stroke-width':2}));
    const rh=el('circle',{class:'handle',cx:x+NODE_W,cy:n.y+NODE_H/2,r:5,fill:'#818cf8',stroke:'#0d1424','stroke-width':2,style:'cursor:crosshair'});
    g.appendChild(rh);

    nodesG.appendChild(g);
  });
}

function drawMini(){
  const mini=document.getElementById('mini'); mini.innerHTML='';
  const W=1500, H=540, vb=mini.clientWidth/W;
  const g=el('g',{transform:`scale(${mini.clientWidth/W})`});
  edges.forEach(e=>{const a=byId(e.from),b=byId(e.to);
    g.appendChild(el('line',{x1:nodeX(a)+NODE_W,y1:a.y+NODE_H/2,x2:nodeX(b),y2:b.y+NODE_H/2,stroke:'#3a4a6e','stroke-width':2}));});
  nodes.forEach(n=>g.appendChild(el('rect',{x:nodeX(n),y:n.y,width:NODE_W,height:NODE_H,rx:6,fill:STATUS[n.status],opacity:0.7})));
  mini.appendChild(g);
}

function render(){ drawEdges(); drawNodes(); drawMini(); }

// ── Detail panel ──────────────────────────────────────────────────────
function select(n){
  selected=n.id; render();
  document.getElementById('panel').classList.add('open');
  document.getElementById('pTitle').textContent=n.icon+' '+n.title;
  const col=STATUS[n.status];
  const blockedBy=edges.filter(e=>e.to===n.id).map(e=>byId(e.from));
  const blocks=edges.filter(e=>e.from===n.id).map(e=>byId(e.to));
  const pct=n.est>0?Math.round(n.logged/n.est*100):0;
  let html='';
  html+=`<div class="meta-row"><span class="pill" style="background:${col}22;color:${col}">${STATUS_TXT[n.status]}</span>
         <span class="pill" style="background:rgba(99,102,241,.15);color:#818cf8">${n.prio}</span></div>`;
  html+=`<div class="pl">Time</div><div class="meta-row">⏱ ${fmt(n.logged)} logged / ${fmt(n.est)} est. · ${pct}%</div>`;
  if(CRIT.has(n.id)) html+=`<div class="meta-row" style="color:#818cf8;font-weight:600">⚡ On the critical path</div>`;

  html+=`<div class="pl">Blocked by (${blockedBy.length})</div>`;
  html+= blockedBy.length ? blockedBy.map(b=>`<div class="dep-item"><span class="d" style="background:${STATUS[b.status]}"></span>${b.icon} ${b.title}</div>`).join('')
        : `<div style="font-size:12px;color:var(--text5)">Nothing — can start now</div>`;

  html+=`<div class="pl">Blocks (${blocks.length})</div>`;
  html+= blocks.length ? blocks.map(b=>`<div class="dep-item"><span class="d" style="background:${STATUS[b.status]}"></span>${b.icon} ${b.title}</div>`).join('')
        : `<div style="font-size:12px;color:var(--text5)">Nothing depends on this</div>`;
  html+=`<button class="add-dep">＋ Add dependency</button>`;

  if(n.subs.length){
    html+=`<div class="pl">Subtasks (${n.subs.filter(s=>s.done).length}/${n.subs.length})</div>`;
    html+=n.subs.map(s=>`<div class="sub-item"><span class="sub-box ${s.done?'on':''}">${s.done?'✓':''}</span>
      <span style="color:${s.done?'var(--text5)':'var(--text2)'};text-decoration:${s.done?'line-through':'none'}">${s.t}</span></div>`).join('');
  }
  document.getElementById('pBody').innerHTML=html;
}
document.getElementById('pClose').onclick=()=>{document.getElementById('panel').classList.remove('open');selected=null;render();};

// ── Pan / zoom ─────────────────────────────────────────────────────────
let scale=1, ox=20, oy=20, panning=false, lx=0, ly=0;
const vp=document.getElementById('viewport'), cv=document.getElementById('cv');
function apply(){ vp.setAttribute('transform',`translate(${ox},${oy}) scale(${scale})`); document.getElementById('zLvl').textContent=Math.round(scale*100)+'%'; }
cv.addEventListener('wheel',e=>{e.preventDefault();scale=Math.min(Math.max(scale*(e.deltaY>0?0.92:1.08),0.35),2.2);apply();},{passive:false});
cv.addEventListener('mousedown',e=>{if(e.target.closest('.node-grp'))return;panning=true;cv.classList.add('panning');lx=e.clientX;ly=e.clientY;});
window.addEventListener('mousemove',e=>{if(!panning)return;ox+=e.clientX-lx;oy+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apply();});
window.addEventListener('mouseup',()=>{panning=false;cv.classList.remove('panning');});
document.getElementById('zIn').onclick=()=>{scale=Math.min(scale*1.15,2.2);apply();};
document.getElementById('zOut').onclick=()=>{scale=Math.max(scale*0.87,0.35);apply();};
document.getElementById('btnFit').onclick=()=>{scale=0.74;ox=20;oy=30;apply();};

// ── Toggles ─────────────────────────────────────────────────────────────
document.getElementById('btnCrit').onclick=function(){critOn=!critOn;this.classList.toggle('on',critOn);render();};
document.getElementById('btnConnect').onclick=function(){connectOn=!connectOn;this.classList.toggle('on',connectOn);
  cv.classList.toggle('connect',connectOn);
  document.getElementById('hint').textContent = connectOn
    ? 'Connect mode · drag a task\'s right handle (●) onto another task to set “must finish before”'
    : 'Scroll to zoom · drag canvas to pan · click a task for details';};
document.getElementById('btnLayout').onclick=()=>{document.getElementById('btnFit').click();};

render(); apply();
</script>
</body>
</html>
